<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — StockPulse</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-scene">
    <div class="bg-glow bg-glow--tl"></div>
    <div class="bg-glow bg-glow--br"></div>
    <canvas class="bg-particles" id="particleCanvas"></canvas>
  </div>

  <!-- Desktop two-column layout -->
  <main class="page">

    <!-- LEFT PANEL -->
    <aside class="panel panel--left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <!-- Candlestick / chart icon -->
            <polyline points="3,24 9,14 14,18 20,8 27,12" stroke="#FF6A00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="27" cy="12" r="2" fill="#FF6A00"/>
            <line x1="3" y1="27" x2="29" y2="27" stroke="#FF6A00" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">StockPulse</span>
      </div>

      <!-- Large hero circle -->
      <div class="hero-wrap">
        <div class="hero-circle" id="heroCircle">
          <svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" class="hero-svg">
            <defs>
              <radialGradient id="skyGrad" cx="50%" cy="38%" r="72%">
                <stop offset="0%"   stop-color="#1a0e00"/>
                <stop offset="45%"  stop-color="#0f0800"/>
                <stop offset="100%" stop-color="#060300"/>
              </radialGradient>
              <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,106,0,0.35)"/>
                <stop offset="100%" stop-color="rgba(255,106,0,0)"/>
              </linearGradient>
              <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(80,220,120,0.25)"/>
                <stop offset="100%" stop-color="rgba(80,220,120,0)"/>
              </linearGradient>
              <clipPath id="heroClip">
                <circle cx="180" cy="180" r="168"/>
              </clipPath>
            </defs>

            <circle cx="180" cy="180" r="168" fill="url(#skyGrad)"/>

            <g clip-path="url(#heroClip)">
              <!-- Grid lines -->
              <line x1="30" y1="100" x2="330" y2="100" stroke="rgba(255,106,0,0.07)" stroke-width="1"/>
              <line x1="30" y1="150" x2="330" y2="150" stroke="rgba(255,106,0,0.07)" stroke-width="1"/>
              <line x1="30" y1="200" x2="330" y2="200" stroke="rgba(255,106,0,0.07)" stroke-width="1"/>
              <line x1="30" y1="250" x2="330" y2="250" stroke="rgba(255,106,0,0.07)" stroke-width="1"/>
              <line x1="90"  y1="80" x2="90"  y2="310" stroke="rgba(255,106,0,0.05)" stroke-width="1"/>
              <line x1="150" y1="80" x2="150" y2="310" stroke="rgba(255,106,0,0.05)" stroke-width="1"/>
              <line x1="210" y1="80" x2="210" y2="310" stroke="rgba(255,106,0,0.05)" stroke-width="1"/>
              <line x1="270" y1="80" x2="270" y2="310" stroke="rgba(255,106,0,0.05)" stroke-width="1"/>

              <!-- Area fill — orange line -->
              <polygon
                points="40,270 40,240 80,215 110,230 140,185 170,195 200,155 230,165 260,130 290,145 320,110 320,270"
                fill="url(#chartFill)"/>
              <!-- Orange main line -->
              <polyline
                points="40,240 80,215 110,230 140,185 170,195 200,155 230,165 260,130 290,145 320,110"
                fill="none" stroke="#FF6A00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

              <!-- Area fill — green secondary line -->
              <polygon
                points="40,270 40,255 80,248 110,260 140,242 170,252 200,238 230,245 260,228 290,235 320,220 320,270"
                fill="url(#greenFill)"/>
              <!-- Green secondary line -->
              <polyline
                points="40,255 80,248 110,260 140,242 170,252 200,238 230,245 260,228 290,235 320,220"
                fill="none" stroke="#50DC78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

              <!-- Candlesticks at bottom -->
              <!-- Candle 1 green -->
              <rect x="55" y="282" width="8" height="14" rx="1" fill="#50DC78" opacity="0.85"/>
              <line x1="59" y1="280" x2="59" y2="298" stroke="#50DC78" stroke-width="1.2" opacity="0.6"/>
              <!-- Candle 2 red -->
              <rect x="80" y="285" width="8" height="10" rx="1" fill="#FF4444" opacity="0.85"/>
              <line x1="84" y1="283" x2="84" y2="297" stroke="#FF4444" stroke-width="1.2" opacity="0.6"/>
              <!-- Candle 3 green -->
              <rect x="105" y="279" width="8" height="16" rx="1" fill="#50DC78" opacity="0.85"/>
              <line x1="109" y1="277" x2="109" y2="297" stroke="#50DC78" stroke-width="1.2" opacity="0.6"/>
              <!-- Candle 4 green -->
              <rect x="130" y="276" width="8" height="18" rx="1" fill="#50DC78" opacity="0.85"/>
              <line x1="134" y1="274" x2="134" y2="296" stroke="#50DC78" stroke-width="1.2" opacity="0.6"/>
              <!-- Candle 5 red -->
              <rect x="155" y="281" width="8" height="12" rx="1" fill="#FF4444" opacity="0.85"/>
              <line x1="159" y1="279" x2="159" y2="295" stroke="#FF4444" stroke-width="1.2" opacity="0.6"/>

              <!-- Glowing dot at chart tip -->
              <circle cx="320" cy="110" r="6" fill="#FF6A00" opacity="0.25"/>
              <circle cx="320" cy="110" r="3.5" fill="#FF8C00"/>
              <circle cx="320" cy="110" r="1.8" fill="#FFD080"/>

              <!-- Price label -->
              <rect x="264" y="92" width="60" height="20" rx="4" fill="rgba(255,106,0,0.18)" stroke="rgba(255,106,0,0.3)" stroke-width="0.8"/>
              <text x="294" y="106" text-anchor="middle" font-size="9" fill="#FF8C44" font-family="monospace" font-weight="600">▲ +4.82%</text>

              <!-- Ticker labels -->
              <text x="50"  y="98" font-size="8" fill="rgba(255,180,80,0.5)" font-family="monospace">AAPL</text>
              <text x="150" y="98" font-size="8" fill="rgba(255,180,80,0.5)" font-family="monospace">TSLA</text>
              <text x="250" y="98" font-size="8" fill="rgba(255,180,80,0.5)" font-family="monospace">NVDA</text>
            </g>

            <!-- Subtle star dots -->
            <circle cx="55"  cy="55"  r="1.2" fill="rgba(255,200,100,0.5)"/>
            <circle cx="290" cy="48"  r="1.5" fill="rgba(255,200,100,0.6)"/>
            <circle cx="320" cy="78"  r="0.9" fill="rgba(255,200,100,0.4)"/>
            <circle cx="75"  cy="82"  r="0.8" fill="rgba(255,200,100,0.35)"/>
          </svg>
        </div>
        <!-- Decorative rings -->
        <div class="hero-ring r1"></div>
        <div class="hero-ring r2"></div>
        <div class="hero-ring r3"></div>
      </div>

      <div class="left-copy">
        <h2 class="left-heading">Where every<br/><em>trade</em> tells a story.</h2>
        <p class="left-body">Real-time quotes, portfolio tracking and market intelligence — all in one powerful dashboard.</p>
      </div>

      <p class="left-legal">© 2026 StockPulse Inc.</p>
    </aside>

    <!-- RIGHT PANEL — card -->
    <section class="panel panel--right">
      <div class="card" id="loginCard">

        <!-- Card header nav -->
        <div class="card-nav">
          <span class="card-brand">STOCKPULSE</span>
          <a href="#" class="card-help" id="helpLink">Need help?</a>
        </div>

        <!-- Small card circle -->
        <div class="card-circle-wrap">
          <div class="card-circle">
            <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="miniSky" cx="50%" cy="50%" r="52%">
                  <stop offset="0%"   stop-color="#1e1000"/>
                  <stop offset="100%" stop-color="#080400"/>
                </radialGradient>
                <linearGradient id="miniFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stop-color="rgba(255,106,0,0.4)"/>
                  <stop offset="100%" stop-color="rgba(255,106,0,0)"/>
                </linearGradient>
                <clipPath id="miniClip"><circle cx="55" cy="55" r="52"/></clipPath>
              </defs>
              <circle cx="55" cy="55" r="52" fill="url(#miniSky)"/>
              <g clip-path="url(#miniClip)">
                <!-- Grid -->
                <line x1="15" y1="45" x2="95" y2="45" stroke="rgba(255,106,0,0.08)" stroke-width="0.8"/>
                <line x1="15" y1="65" x2="95" y2="65" stroke="rgba(255,106,0,0.08)" stroke-width="0.8"/>
                <!-- Area -->
                <polygon points="15,85 15,72 30,65 42,70 55,55 68,60 80,44 95,48 95,85" fill="url(#miniFill)"/>
                <!-- Line -->
                <polyline points="15,72 30,65 42,70 55,55 68,60 80,44 95,48"
                  fill="none" stroke="#FF6A00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Tip dot -->
                <circle cx="95" cy="48" r="4" fill="#FF6A00" opacity="0.3"/>
                <circle cx="95" cy="48" r="2.5" fill="#FF8C00"/>
                <!-- % label -->
                <rect x="62" y="28" width="36" height="14" rx="3" fill="rgba(255,106,0,0.2)" stroke="rgba(255,106,0,0.4)" stroke-width="0.7"/>
                <text x="80" y="38" text-anchor="middle" font-size="6.5" fill="#FF9944" font-family="monospace" font-weight="700">▲ +3.6%</text>
              </g>
            </svg>
          </div>
          <div class="card-circle-glow"></div>
        </div>

        <!-- Heading -->
        <div class="card-head">
          <h1 class="card-title">Login StockPulse</h1>
          <p class="card-subtitle">Welcome back, the market awaits.</p>
        </div>

        <!-- LOGIN FORM — action points to same page -->
        <form class="login-form" id="loginForm" method="POST" action="" novalidate>

          <div class="field" id="fUsername">
            <label class="f-label" for="username">Trader ID / Username</label>
            <div class="f-wrap">
              <input
                class="f-input"
                type="text"
                id="username"
                name="username"
                placeholder="Enter your trader ID"
                autocomplete="username"
              />
              <span class="f-bar"></span>
            </div>
            <p class="f-err" id="usernameErr"></p>
          </div>

          <div class="field" id="fPassword">
            <label class="f-label" for="password">Password</label>
            <div class="f-wrap">
              <input
                class="f-input"
                type="password"
                id="password"
                name="password"
                placeholder="Enter your secure password"
                autocomplete="current-password"
              />
              <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
                <svg id="eyeShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
              <span class="f-bar"></span>
            </div>
            <p class="f-err" id="passwordErr"></p>
          </div>

          <div class="field" id="fEmail">
            <label class="f-label" for="email">Registered Email <span class="f-opt">(optional)</span></label>
            <div class="f-wrap">
              <input
                class="f-input"
                type="email"
                id="email"
                name="email"
                placeholder="your@brokerage.com"
                autocomplete="email"
              />
              <span class="f-bar"></span>
            </div>
            <p class="f-err" id="emailErr"></p>
          </div>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" id="rememberMe" name="remember"/>
              <span class="chk-box"></span>
              <span class="chk-label">Remember me</span>
            </label>
            <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span id="btnText">Login</span>
            <svg id="btnSpinner" class="btn-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none">
              <circle cx="12" cy="12" r="9" stroke-dasharray="56.5" stroke-dashoffset="42"/>
            </svg>
          </button>

        </form>

        <p class="signup-row">
          New to StockPulse?&nbsp;
          <a href="#" class="signup-link" id="signupLink">Open a free account</a>
        </p>

      </div>
    </section>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="login.js"></script>
</body>
</html>
